RUN_NAME: 'flatmatch_ncsam_cifar10_40_V1'
ALGORITHM: 'flatmatch_ncsam'
OUTPUT_DIR: 'model_ckpt'
CONT_TRAIN: False
RESUME: 'logs/flatmatch_ncsam_cifar10_40/model_ckpt/last_checkpoint.pth'
SEED: 0
LOG_DIR: 'logs'
USE_CUDA: True
USE_TB: True
TB_DIR: 'tensorboard_runs/flatmatch_ncsam_cifar10_40_run_0'
VALIDATE_ONLY: False
X_SHARP: True
RHO: 0.05

NCSAM:
  ENABLED: True
  START_ITER: 0
  WARMUP_ITERS: 10000
  RAMP_ITERS: 20000
  PLATEAU_ITERS: 50000
  DECAY_ITERS: 20000
  MIN_LAMBDA: 0.005
  MAX_LAMBDA: 0.05
  MIN_SELECT_RATIO: 0.1
  SELECT_RATIO: 0.2
  MARGIN_TEMPERATURE: 1.0
  DENSITY_POWER: 0.5
  MIN_DENSITY: 0.05
  SINGLETON_DENSITY: 0.5
  BATCH_PRIOR_WEIGHT: 0.3
  CLASS_BALANCE_POWER: 1.0
  MAX_BALANCE_WEIGHT: 2.0
  MAX_SAMPLE_WEIGHT: 4.0

DATASET:
  PREPARE: False
  DIR: '/home/xjy/code/Label_noise_experiment/data'
  NAME: 'cifar10'
  NUM_LABELED: 40
  NUM_CLASSES: 10
  NUM_WORKERS: 8
  CONVERT_ONE_HOT: False
  IMG_SIZE: 32
  URATIO: 7
  TRAIN_BATCH_SIZE: 64
  TEST_BATCH_SIZE: 512
  CROP_RATIO: 0.875
  PIXEL_MEAN: [0.4913, 0.4823, 0.4466]
  PIXEL_STD: [0.2470, 0.2435, 0.2615]
  RANDAUG_N: 3

MODEL:
  NAME: 'wrn_28_2'
  PRETRAINED: False
  PRETRAINED_PATH: ''

OPTIMIZER:
  NAME: 'SGD'
  LR: 0.03
  MOMENTUM: 0.9
  NESTEROV: True
  WEIGHT_DECAY: 0.0005
  SKIP_BN: True

TRAINER:
  SAT_EMA: 0.999
  AMP_ENABLED: True
  NUM_WARMUP_ITERS: 0
  NUM_TRAIN_ITERS: 100000 # 2^20
  NUM_EVAL_ITERS: 500
  NUM_LOG_ITERS: 64
  EMA_VAL: 0.999
  ULB_LOSS_RATIO: 1.0
  ENT_LOSS_RATIO: 0.05
